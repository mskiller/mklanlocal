[alembic]
script_location = alembic
prepend_sys_path = src
# This value is overridden at runtime by env.py which reads DATABASE_URL from the environment.
# It is only used if you run alembic directly without the app config loaded.
# Set DATABASE_URL in your .env instead.
sqlalchemy.url = postgresql+psycopg://media_indexer:change-me@localhost:5432/media_indexer

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

